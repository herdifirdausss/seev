# Bounded log rotation for the six app-profile containers (docs/plan/43 T1
# Langkah 5) — without this, Docker's default json-file driver keeps
# container stdout/stderr forever, which on a laptop-scale disk eventually
# fills up regardless of Loki's own 48h retention.
x-app-logging: &app-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # The image's own bootstrap superuser is the SCHEMA-OWNER identity
      # (POSTGRES_MIGRATE_USER), never the app's restricted connection — see
      # docs/plan/16 Task T3 / .env.example's PostgreSQL section for why.
      POSTGRES_USER: ${POSTGRES_MIGRATE_USER:-seev}
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATE_PASSWORD:-seev}
      POSTGRES_DB: ${POSTGRES_DB:-seev}
      # Consumed by scripts/postgres-init/ (not the postgres image itself)
      # to provision the app's restricted login role at first boot.
      APP_DB_USER: ${POSTGRES_USER:-seev_app}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-seev_app}
    ports:
      # Host port defaults to 5433, not Postgres's standard 5432: a native
      # (Homebrew-installed) Postgres commonly already occupies 5432 on a
      # macOS dev machine, bound specifically to loopback — which wins over
      # Docker Desktop's wildcard-bound port-forward for any connection to
      # "localhost:5432", silently routing the app at the WRONG database
      # instead of failing loudly. Override with POSTGRES_PORT in .env if
      # your machine has no such conflict and you'd rather use 5432.
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - seev_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MIGRATE_USER:-seev} -d ${POSTGRES_DB:-seev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host uses 6380 to avoid colliding with a locally installed Redis.
      # Containers keep reaching this service as redis:6379.
      - "127.0.0.1:6380:6379"
    volumes:
      - seev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-seev}
    ports:
      - "127.0.0.1:5672:5672"   # AMQP
      - "127.0.0.1:15672:15672" # management UI
    volumes:
      - seev_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ledger-service:
    profiles: ["app"]
    image: seev/ledger-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: ledger-service
    logging: *app-logging
    environment:
      APP_NAME: ledger-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8090"
      INTERNAL_APP_PORT: "8091"
      INTERNAL_APP_BIND_ADDR: 0.0.0.0
      GRPC_PORT: "9091"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ledger_app
      POSTGRES_PASSWORD: ledger_app
      POSTGRES_DB: seev_ledger
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-seev}
      RABBITMQ_EXCHANGE: ledger.events
      FRAUD_GRPC_ADDR: fraud-service:9094
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
    ports:
      - "127.0.0.1:8090:8090"
      - "127.0.0.1:8091:8091"
      - "127.0.0.1:9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

