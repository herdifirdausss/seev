      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8093"
      GRPC_PORT: "9093"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: payout_app
      POSTGRES_PASSWORD: payout_app
      POSTGRES_DB: seev_payout
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      LEDGER_GRPC_ADDR: ledger-service:9091
      FRAUD_GRPC_ADDR: fraud-service:9094
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      VENDOR_MOCKVENDOR_ENABLED: "true"
      VENDOR_MOCKVENDOR_SECRET: ${VENDOR_MOCKVENDOR_SECRET:-change-me-mockvendor-secret}
