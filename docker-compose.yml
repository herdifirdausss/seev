      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8094"
      GRPC_PORT: "9094"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: fraud_app
      POSTGRES_PASSWORD: fraud_app
      POSTGRES_DB: seev_fraud
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      REDIS_DB: "1"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-seev}
      RABBITMQ_EXCHANGE: ledger.events
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
      SCREENING_MODE: ${SCREENING_MODE:-off}
      SCREENING_AMOUNT_THRESHOLD: ${SCREENING_AMOUNT_THRESHOLD:-0}
      SCREENING_VELOCITY_MAX_PER_HOUR: ${SCREENING_VELOCITY_MAX_PER_HOUR:-0}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8094:8094"
      - "127.0.0.1:9094:9094"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  admin-bff-service:
    profiles: ["app"]
    image: seev/admin-bff-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: admin-bff-service
    logging: *app-logging
    environment:
      APP_NAME: admin-bff-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8095"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: adminbff_app
      POSTGRES_PASSWORD: adminbff_app
      POSTGRES_DB: seev_adminbff
      POSTGRES_SSL_MODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
      TLS_CERT_DIR: /certs
      AUTH_SERVICE_URL: http://auth-service:8082
      AUTH_ADMIN_SERVICE_URL: https://auth-service:8083
      LEDGER_SERVICE_URL: https://ledger-service:8091
      PAYIN_SERVICE_URL: https://payin-service:8092
      PAYOUT_SERVICE_URL: https://payout-service:8093
      FRAUD_SERVICE_URL: https://fraud-service:8094
      GATEWAY_SERVICE_URL: https://gateway-service:8081
      ADMIN_BFF_SECURE_COOKIE: "false"
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  assurance-service:
    profiles: ["app"]
    image: seev/assurance-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: assurance-service
    logging: *app-logging
    environment:
      APP_NAME: assurance-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8096"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: assurance_app
      POSTGRES_PASSWORD: assurance_app
      POSTGRES_DB: seev_assurance
      POSTGRES_SSL_MODE: disable
      PAYIN_GRPC_ADDR: payin-service:9092
      PAYOUT_GRPC_ADDR: payout-service:9093
      LEDGER_GRPC_ADDR: ledger-service:9091
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
      ASSURANCE_INTERVAL: ${ASSURANCE_INTERVAL:-60s}
      ASSURANCE_CONSISTENCY_DELAY: ${ASSURANCE_CONSISTENCY_DELAY:-2m}
      ASSURANCE_PAGE_SIZE: ${ASSURANCE_PAGE_SIZE:-500}
      ASSURANCE_RPC_TIMEOUT: ${ASSURANCE_RPC_TIMEOUT:-3s}
      ASSURANCE_CONCURRENCY: ${ASSURANCE_CONCURRENCY:-2}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8096:8096"
    depends_on:
      postgres:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      payin-service:
        condition: service_healthy
      payout-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  gateway-service:
    profiles: ["app"]
    image: seev/gateway-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: gateway
    logging: *app-logging
    environment:
      APP_NAME: gateway-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8080"
      INTERNAL_APP_PORT: "8081"
      INTERNAL_APP_BIND_ADDR: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: gateway_app
      POSTGRES_PASSWORD: gateway_app
      POSTGRES_DB: seev_gateway
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-seev}
      RABBITMQ_EXCHANGE: ledger.events
      LEDGER_GRPC_ADDR: ledger-service:9091
      LEDGER_USER_API_URL: https://ledger-service:8090
      PAYIN_GRPC_ADDR: payin-service:9092
      PAYOUT_GRPC_ADDR: payout-service:9093
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      payin-service:
        condition: service_healthy
      payout-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  # docs/roadmap/archive/43 (track A1) — local observability stack: Prometheus, Grafana,
  # Loki, Tempo, Alloy, and a Docker socket proxy, all opt-in behind the
  # `observability` profile (never started by a bare `docker compose up`).
  # Replaces the old Jaeger-only trace viewer — Tempo keeps the same host
  # port 4317 so OTEL_EXPORTER_OTLP_ENDPOINT does not change. Run with:
  #   make observability-secret   # once per machine, generates Grafana password
  #   docker compose --profile app --profile observability up -d
  # Then open http://localhost:3000 (Grafana; see K1 for the admin password
  # location) and http://localhost:9090 (Prometheus). All observability
  # ports are bound to 127.0.0.1 only — see docs/roadmap/archive/43 K1.
  #
  # RAM budget: ~1.9 GiB on top of the app+infra profiles, inside the 4 GB
  # Docker Desktop budget documented in docs/development/project-guide.md — do NOT run this profile
  # at the same time as the testcontainers integration suite.
  prometheus:
    image: prom/prometheus@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893 # v3.12.0-distroless
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=35d
      - --storage.tsdb.retention.size=1GB
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - seev_prometheus_data:/prometheus
      # docs/roadmap/archive/49 K6: every scrape target now requires mTLS — Prometheus
      # presents the "prometheus" identity, mirrors the app-tier cert-volume
      # pattern (read-only; the container is also read_only itself below).
      - ./deploy/certs:/certs:ro
    ports:
      - "127.0.0.1:9090:9090"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 384M
    # The distroless image has no shell/wget/curl, so no container-level
    # healthcheck is possible (docs/roadmap/archive/43 K1 hardening exception).
    # Readiness is verified externally: curl 127.0.0.1:9090/-/ready.

  grafana:
    image: grafana/grafana@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63 # 13.1.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_PASSWORD_POLICY: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    secrets:
      - grafana_admin_password
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - seev_grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8 # 3.7.3
    profiles: ["observability"]
    command:
      - -config.file=/etc/loki/loki.yaml
    volumes:
      - ./deploy/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - seev_loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 384M
    # No shell in the loki image — no container healthcheck possible
    # (docs/roadmap/archive/43 K1 hardening exception). Readiness verified externally:
    # curl 127.0.0.1:3100/ready.

  tempo:
    image: grafana/tempo@sha256:ee21727732c7a7199cb71c3eee9153bbf23f9b0b87619f0555a0cf21a67f1a33 # 2.10.5
    profiles: ["observability"]
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./deploy/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - seev_tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 384M
    # No shell in the tempo image — no container healthcheck possible
    # (docs/roadmap/archive/43 K1 hardening exception). Readiness verified externally:
    # curl 127.0.0.1:3200/ready.

  # Only component allowed to touch the real Docker socket — exposes a
  # restricted, allowlisted TCP API to Alloy instead (docs/roadmap/archive/43 K1/K9).
  # No host port; lives only on the private observability_socket_net.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476 # v0.4.2
    profiles: ["observability"]
    environment:
      CONTAINERS: "1"
      # NETWORKS=1 is required (not originally planned — see docs/roadmap/archive/43
      # T1 Results): Alloy's discovery.docker component calls GET /networks
      # to resolve each container's network labels, even though it never
      # needs to create/modify a network. Still read-only; POST stays 0.
      NETWORKS: "1"
      EVENTS: "1"
      PING: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability_socket_net
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
      - /run
      - /var/lib/haproxy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2375/_ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 64M
    # Runs as root: it's the one component intentionally trusted to read
    # /var/run/docker.sock (docs/roadmap/archive/43 K1 hardening exception, by design).

  alloy:
    image: grafana/alloy@sha256:51aeb9d829239345070619dad3edd6873186f913c84f45b365b74574fcb38ec0 # v1.16.1
    profiles: ["observability"]
    # The image's own entrypoint drops root -> uid 473 (alloy) via a setuid
    # call that needs CAP_SETUID/CAP_SETGID; cap_drop: ALL below removes
    # those, so the privilege drop silently fails and the process is left
    # running as root without CAP_DAC_OVERRIDE, unable to write into the
    # image's own 473:473-owned /var/lib/alloy/data. Setting user: here
    # sets the UID at container-create time instead (no in-container
    # syscall needed), so it works even with every capability dropped.
    user: "473:473"
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=127.0.0.1:12345
    volumes:
      - ./deploy/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - seev_alloy_data:/var/lib/alloy/data
    networks:
      - default
      - observability_socket_net
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
      loki:
        condition: service_started
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 192M
    # Runs as non-root uid 473 (see `user:` above) and never mounts the
    # Docker socket itself — only reaches it through docker-socket-proxy's
    # allowlisted TCP API (docs/roadmap/archive/43 K1).

networks:
  # Isolates docker-socket-proxy + Alloy from every other container —
  # nothing else can reach the proxy's allowlisted Docker API (docs/roadmap/archive/43 K1).
  observability_socket_net:
    internal: true

secrets:
  # Generated locally by `make observability-secret` (mode 0600, gitignored;
  # never a default/committed password — docs/roadmap/archive/43 K1).
  grafana_admin_password:
    file: ./deploy/observability/secrets/grafana_admin_password
  # docs/roadmap/active/50 K3/K5: generated locally by `make backup-secret`, mode
  # 0600, gitignored — never a default/committed credential.
  seev_backup_password:
    file: ./deploy/backup/secrets/seev_backup_password
  pgbackrest_repo_passphrase:
    file: ./deploy/backup/secrets/pgbackrest_repo_passphrase

volumes:
  seev_postgres_data:
  # docs/roadmap/active/50 T2: shares the Postgres Unix socket directory between the
  # postgres and backup-agent containers (see the postgres service's own
  # volumes comment) — never mounted anywhere else.
  seev_backup_socket:
  seev_redis_data:
  seev_rabbitmq_data:
  seev_prometheus_data:
  seev_grafana_data:
  seev_loki_data:
  seev_tempo_data:
  seev_alloy_data:
