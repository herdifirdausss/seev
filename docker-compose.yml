# Bounded log rotation for the six app-profile containers (docs/roadmap/archive/43 T1
# Step 5) — without this, Docker's default json-file driver keeps
# container stdout/stderr forever, which on a laptop-scale disk eventually
# fills up regardless of Loki's own 48h retention.
x-app-logging: &app-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# docs/roadmap/archive/49 K3: every internal-facing app container mounts the same
# host-generated CA + per-service leaf certs read-only — `make certs`
# (mirrors the `observability-secret` pattern: generated, gitignored,
# never committed) writes them to ./deploy/certs before compose ever
# reads this file.
x-cert-volume: &cert-volume
  - ./deploy/certs:/certs:ro

services:
  postgres:
    image: seev/postgres-backup:${SEEV_IMAGE_TAG:-dev}
    build:
      context: ./deploy/backup
    environment:
      # The image's own bootstrap superuser is the SCHEMA-OWNER identity
      # (POSTGRES_MIGRATE_USER), never the app's restricted connection — see
      # docs/roadmap/archive/16 Task T3 / .env.example's PostgreSQL section for why.
      POSTGRES_USER: ${POSTGRES_MIGRATE_USER:-seev}
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATE_PASSWORD:-seev}
      POSTGRES_DB: ${POSTGRES_DB:-seev}
      # Consumed by scripts/postgres-init/ (not the postgres image itself)
      # to provision the app's restricted login role at first boot.
      APP_DB_USER: ${POSTGRES_USER:-seev_app}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-seev_app}
      # docs/roadmap/active/50 K2: --data-checksums only takes effect on a FRESH
      # initdb — an already-initialized volume (like this repo's own dev
      # volume, seev_postgres_data, created before Track A7) needs the
      # separate offline `make backup-checksums-enable` procedure instead;
      # see docs/roadmap/active/50 T1 Result for that procedure and its evidence.
      POSTGRES_INITDB_ARGS: "--data-checksums"
      BACKUP_PASSWORD_FILE: /run/secrets/seev_backup_password
    secrets:
      - seev_backup_password
      - pgbackrest_repo_passphrase
    # docs/roadmap/active/50 K2/K4: continuous WAL archiving via pgBackRest, a 60s
    # archive_timeout so an idle workload still closes the RPO window
    # (K4), and wal_level=replica (pgBackRest's baseline requirement —
    # logical is not needed here and costs more WAL volume for no benefit
    # this track uses).
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60
      - -c
      - archive_command=pgbackrest --stanza=seev --config=/etc/pgbackrest/pgbackrest.conf archive-push %p
    ports:
      # Host port defaults to 5433, not Postgres's standard 5432: a native
      # (Homebrew-installed) Postgres commonly already occupies 5432 on a
      # macOS dev machine, bound specifically to loopback — which wins over
      # Docker Desktop's wildcard-bound port-forward for any connection to
      # "localhost:5432", silently routing the app at the WRONG database
      # instead of failing loudly. Override with POSTGRES_PORT in .env if
      # your machine has no such conflict and you'd rather use 5432.
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - seev_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
      - ./migrations:/migrations:ro
      - ./deploy/backup/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      # docs/roadmap/active/50 K3: the backup repository is a HOST PATH, deliberately
      # separate from seev_postgres_data — a destructive drill cleanup may
      # remove only an isolated restore target volume, never this path.
      - ${BACKUP_REPO_PATH:-./deploy/backup/repo}:/backup-repo
      # docs/roadmap/active/50 T2: shared with backup-agent so pgBackRest's own
      # libpq control connection (pg_backup_start/stop) can reach this
      # server over a plain Unix socket — a named volume makes a Unix
      # socket file reachable across the container boundary without any
      # network/SSH/TLS-remote protocol on pgBackRest's side.
      - seev_backup_socket:/var/run/postgresql
    healthcheck:
      # -h 127.0.0.1, not the default Unix socket (docs/roadmap/active/50 T6 fix): the
      # official postgres image's entrypoint runs every
      # /docker-entrypoint-initdb.d/*.sh script (including 04-backup-role.sh,
      # which iterates all 8 databases and can take several seconds)
      # against a TEMPORARY server started with listen_addresses='' —
      # Unix-socket only, deliberately unreachable from outside the
      # container. A bare `pg_isready` (no -h) also defaults to that same
      # Unix socket, so it happily reports "healthy" against the temp
      # server mid-init-script — well before the real, TCP-listening
      # final server has even started. Found live: `docker compose ps`
      # showed postgres "healthy" while app services were already
      # crash-looping on the SAME container with "connection refused" on
      # its own network address, because it wasn't listening on TCP yet.
      # The temp server never binds TCP, so a TCP-targeted check can only
      # succeed once the real server does.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_MIGRATE_USER:-seev} -d ${POSTGRES_DB:-seev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # docs/roadmap/active/50 T2 (K13): the opt-in operational backup agent — owns the
  # weekly-full/daily-differential pgBackRest schedule and exposes
  # mTLS-protected /health, /ready, /metrics. Not part of the "app"
  # profile: it is an ops component, started explicitly
  # (`docker compose --profile backup up -d backup-agent`), never implied
  # by a normal `--profile app` boot.
  backup-agent:
    profiles: ["backup"]
    image: seev/backup-agent:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: deploy/backup/agent.Dockerfile
    logging: *app-logging
    environment:
      APP_PORT: "8097"
      TLS_CERT_DIR: /certs
      BACKUP_STANZA: seev
      # Deliberately NOT prefixed PGBACKREST_ — pgBackRest itself scans its
      # own process environment for any PGBACKREST_<OPTION>-shaped
      # variable (that's how the real PGBACKREST_REPO1_CIPHER_PASS below
      # reaches it) and a name like PGBACKREST_CONFIG_PATH collides with
      # its own config-path option, corrupting config resolution — found
      # live in docs/roadmap/active/50 T2 execution.
      BACKUP_PGBACKREST_CONF: /etc/pgbackrest/pgbackrest.conf
      BACKUP_REPO_PASSPHRASE_FILE: /run/secrets/pgbackrest_repo_passphrase
      BACKUP_PASSWORD_FILE: /run/secrets/seev_backup_password
      BACKUP_MANIFEST_DIR: /app/manifests
      # K4's weekly-full/daily-diff Asia/Jakarta schedule is the default
      # (internal/backupagent/config.go) — these overrides exist for an
      # operator who needs a different window, and were exercised
      # directly to verify the scheduled path in docs/roadmap/active/50 T2 Result.
      BACKUP_FULL_CRON: "${BACKUP_FULL_CRON:-}"
      BACKUP_DIFF_CRON: "${BACKUP_DIFF_CRON:-}"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      SOURCE_ENV_LABEL: ${SOURCE_ENV_LABEL:-local-dev}
    secrets:
      - seev_backup_password
      - pgbackrest_repo_passphrase
    volumes:
      - ./deploy/certs:/certs:ro
      - ./deploy/backup/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ${BACKUP_REPO_PATH:-./deploy/backup/repo}:/backup-repo
      - ./deploy/backup/manifests:/app/manifests
      - seev_backup_socket:/var/run/postgresql
      # Read-only: backup-agent copies data pages into the repository, it
      # never writes to PGDATA itself (K5 least-privilege applies at the
      # filesystem level too, not just the Postgres role level).
      - seev_postgres_data:/var/lib/postgresql/data:ro
    ports:
      - "127.0.0.1:18097:8097"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "backup-agent", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  redis:
    image: redis:7.4.9-alpine
    ports:
      # Host uses 6380 to avoid colliding with a locally installed Redis.
      # Containers keep reaching this service as redis:6379.
      - "127.0.0.1:6380:6379"
    volumes:
      - seev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-seev}
    ports:
      - "127.0.0.1:5672:5672"   # AMQP
      - "127.0.0.1:15672:15672" # management UI
    volumes:
      - seev_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # docs/roadmap/archive/49 K7: dev-mode Vault, opt-in behind its own `secrets`
  # profile (never started by a bare `docker compose up`, same convention
  # as `observability`) — an in-memory secrets backend for local
  # experimentation, not a production secrets store. Dev mode auto-
  # unseals and auto-mounts a KV v2 engine at `secret/` on boot; every
  # secret is lost and must be re-seeded (`scripts/vault-seed.sh`) each
  # time the container restarts — a deliberate, documented residual
  # (docs/security/threat-model.md), not an oversight. Run with:
  #   docker compose --profile secrets up -d vault
  #   VAULT_ADDR=http://localhost:18200 VAULT_TOKEN=<see below> ./scripts/vault-seed.sh
  vault:
    image: hashicorp/vault@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54 # latest, v2.0.3, digest verified 2026-07-22
    profiles: ["secrets"]
    cap_add: ["IPC_LOCK"] # dev mode still locks its in-memory storage
    environment:
      # Fixed, non-secret dev token by design — dev mode's data never
      # survives a restart anyway, so there's nothing this token actually
      # protects beyond a throwaway local instance. Override for a
      # personal machine if desired; never used in CI/nightly (K7 — those
      # stay env-generated, Vault is entirely out of that path).
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-seev-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "127.0.0.1:18200:8200"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ledger-service:
    profiles: ["app"]
    image: seev/ledger-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: ledger-service
    logging: *app-logging
    environment:
      APP_NAME: ledger-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8090"
      INTERNAL_APP_PORT: "8091"
      INTERNAL_APP_BIND_ADDR: 0.0.0.0
      GRPC_PORT: "9091"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ledger_app
      POSTGRES_PASSWORD: ledger_app
      POSTGRES_DB: seev_ledger
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-seev}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-seev}
      RABBITMQ_EXCHANGE: ledger.events
      FRAUD_GRPC_ADDR: fraud-service:9094
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8090:8090"
      - "127.0.0.1:8091:8091"
      - "127.0.0.1:9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    profiles: ["app"]
    image: seev/auth-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: auth-service
    logging: *app-logging
    environment:
      APP_NAME: auth-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8082"
      INTERNAL_APP_PORT: "8083"
      INTERNAL_APP_BIND_ADDR: 0.0.0.0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: auth_app
      POSTGRES_PASSWORD: auth_app
      POSTGRES_DB: seev_auth
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      LEDGER_GRPC_ADDR: ledger-service:9091
      FRAUD_GRPC_ADDR: fraud-service:9094
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  payin-service:
    profiles: ["app"]
    image: seev/payin-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: payin-service
    logging: *app-logging
    environment:
      APP_NAME: payin-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8092"
      GRPC_PORT: "9092"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: payin_app
      POSTGRES_PASSWORD: payin_app
      POSTGRES_DB: seev_payin
      POSTGRES_SSL_MODE: disable
      LEDGER_GRPC_ADDR: ledger-service:9091
      FRAUD_GRPC_ADDR: fraud-service:9094
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
      VENDOR_MOCKVENDOR_ENABLED: "true"
      VENDOR_MOCKVENDOR_SECRET: ${VENDOR_MOCKVENDOR_SECRET:-change-me-mockvendor-secret}
      MOCKVENDOR2_ENABLED: "true"
      MOCKVENDOR2_SECRET: ${MOCKVENDOR2_SECRET:-change-me-mockvendor2-secret}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8092:8092"
      - "127.0.0.1:9092:9092"
    depends_on:
      postgres:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  payout-service:
    profiles: ["app"]
    image: seev/payout-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
      args:
        SERVICE: payout-service
    logging: *app-logging
    environment:
      APP_NAME: payout-service
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-0.10}"
      OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-true}"
      APP_PORT: "8093"
      GRPC_PORT: "9093"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-change-me-to-a-random-32-plus-character-token}
      TLS_CERT_DIR: /certs
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: payout_app
      POSTGRES_PASSWORD: payout_app
      POSTGRES_DB: seev_payout
      POSTGRES_SSL_MODE: disable
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      LEDGER_GRPC_ADDR: ledger-service:9091
      FRAUD_GRPC_ADDR: fraud-service:9094
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-32-plus-character-secret}
      JWT_ISSUER: ${JWT_ISSUER:-seev}
      VENDOR_MOCKVENDOR_ENABLED: "true"
      VENDOR_MOCKVENDOR_SECRET: ${VENDOR_MOCKVENDOR_SECRET:-change-me-mockvendor-secret}
      MOCKVENDOR2_ENABLED: "true"
      MOCKVENDOR2_SECRET: ${MOCKVENDOR2_SECRET:-change-me-mockvendor2-secret}
    volumes: *cert-volume
    ports:
      - "127.0.0.1:8093:8093"
      - "127.0.0.1:9093:9093"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/service", "-healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  fraud-service:
    profiles: ["app"]
    image: seev/fraud-service:${SEEV_IMAGE_TAG:-dev}
    build:
      context: .
