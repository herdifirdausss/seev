root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/gateway ./cmd/gateway"
  bin = "./tmp/gateway"
  full_bin = "./tmp/gateway"
  include_ext = ["go", "sql", "env"]
  exclude_dir = ["tmp", "bin", "docs"]
  exclude_regex = ["_test\\.go"]
  delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
