syntax = "proto3";

package seev.payin.v1;

import "google/protobuf/timestamp.proto";

service PayinService {
  rpc HandleWebhook(HandleWebhookRequest) returns (HandleWebhookResponse);
  rpc CreateTopupIntent(CreateTopupIntentRequest) returns (CreateTopupIntentResponse);
  rpc GetTopupIntent(GetTopupIntentRequest) returns (GetTopupIntentResponse);
  // Read-only product-assurance projection. Additive: existing callers are
  // unaffected and sensitive webhook payloads never cross this boundary.
  rpc ListAssuranceRecords(ListAssuranceRecordsRequest) returns (ListAssuranceRecordsResponse);
  rpc GetIntakeControl(GetIntakeControlRequest) returns (GetIntakeControlResponse);
  rpc ApplyIntakeControl(ApplyIntakeControlRequest) returns (ApplyIntakeControlResponse);
}

message HandleWebhookRequest {
  string vendor = 1;
  map<string, string> headers = 2;
  bytes raw_body = 3;
}

enum WebhookResult {
  WEBHOOK_RESULT_UNSPECIFIED = 0;
  WEBHOOK_RESULT_OK = 1;
  WEBHOOK_RESULT_IGNORED = 2;
  WEBHOOK_RESULT_BUSINESS_FAILURE = 3;
}

message HandleWebhookResponse {
  WebhookResult result = 1;
}

message CreateTopupIntentRequest {
  string user_id = 1;
  string amount = 2;
}

message GetTopupIntentRequest {
  string id = 1;
  string user_id = 2;
}

message CreateTopupIntentResponse {
  TopupIntent intent = 1;
}

message GetTopupIntentResponse {
  TopupIntent intent = 1;
}

message TopupIntent {
  string id = 1;
  string reference = 2;
  string user_id = 3;
  string amount = 4;
  string currency = 5;
  string vendor = 6;
  string status = 7;
  google.protobuf.Timestamp expires_at = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ListAssuranceRecordsRequest {
  google.protobuf.Timestamp cursor_updated_at = 1;
  string cursor_id = 2;
  google.protobuf.Timestamp cutoff = 3;
  uint32 page_size = 4;
}

message ListAssuranceRecordsResponse {
  repeated AssuranceRecord records = 1;
  google.protobuf.Timestamp next_updated_at = 2;
  string next_id = 3;
  bool has_more = 4;
}

message AssuranceRecord {
  string record_type = 1; // intent | webhook_event
  string id = 2;
  google.protobuf.Timestamp effective_updated_at = 3;
  google.protobuf.Timestamp created_at = 4;
  string status = 5;
  string user_id = 6;
  string amount = 7;
  string currency = 8;
  string vendor = 9;
  string reference = 10;
  string external_ref = 11;
  string settled_event_id = 12;
  string request_id = 13;
  bool request_id_present = 14;
  string ledger_type = 15;
  string ledger_gateway = 16;
  string ledger_external_ref = 17;
  string ledger_idempotency_scope = 18;
}

message GetIntakeControlRequest {}

message GetIntakeControlResponse {
  bool paused = 1;
  int64 revision = 2;
  string updated_by = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message ApplyIntakeControlRequest {
  string command_id = 1;
  string action = 2; // pause | resume
  int64 expected_revision = 3;
  string actor = 4;
  string reason = 5;
}

message ApplyIntakeControlResponse {
  bool applied = 1;
  bool paused = 2;
  int64 revision = 3;
}
