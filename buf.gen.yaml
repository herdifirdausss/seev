version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/herdifirdausss/seev/gen
    - file_option: go_package
      path: seev/ping/v1
      value: github.com/herdifirdausss/seev/gen/ping/v1
    - file_option: go_package
      path: seev/ledger/v1
      value: github.com/herdifirdausss/seev/gen/ledger/v1
    - file_option: go_package
      path: seev/payin/v1
      value: github.com/herdifirdausss/seev/gen/payin/v1
    - file_option: go_package
      path: seev/payout/v1
      value: github.com/herdifirdausss/seev/gen/payout/v1
    - file_option: go_package
      path: seev/fraud/v1
      value: github.com/herdifirdausss/seev/gen/fraud/v1
plugins:
  - local: protoc-gen-go
    out: gen
    opt:
      - paths=import
      - module=github.com/herdifirdausss/seev/gen
  - local: protoc-gen-go-grpc
    out: gen
    opt:
      - paths=import
      - module=github.com/herdifirdausss/seev/gen
