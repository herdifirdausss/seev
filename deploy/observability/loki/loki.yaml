# docs/plan/43 K1/K9 — single-binary Loki, filesystem storage, 48h
# retention. Labels are kept low-cardinality (compose_service, environment,
# level only — see Alloy config for what actually gets attached).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 48h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # docs/plan/43 Task T6 — Loki 3.x auto-detects a `service_name` label
  # from a fixed list of candidate keys, defaulting to "unknown_service"
  # when none match (found live: every stream from this stack carried
  # service_name="unknown_service", a fourth label the K9 label-set
  # contract doesn't call for and that added no information — compose_service
  # already identifies the service). Empty list disables the feature
  # entirely rather than trying to make it resolve to something useful.
  discover_service_name: []

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
