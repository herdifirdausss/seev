# docs/plan/43 Task T5 — Grafana unified alerting, file-provisioned.
# Generated once by a scratch script for consistency across 3 SLOs x 3
# burn-rate pairs (K7) plus 6 operational alerts (K8); edit by hand from
# here on, this file is the source of truth. Every rule's `runbook`
# annotation maps to the K8 table in docs/plan/43-a1-observability.md.
apiVersion: 1
groups:
- orgId: 1
  name: slo_burn_alerts
  folder: Seev
  interval: 1m
  rules:
  - uid: seev-slo-posting-fast
    title: 'SLO burn: posting_availability (fast_burn, 5m&1h > 14.4x)'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: "count(\n  slo:burnrate:rate5m{slo=\"posting_availability\"} > 14.4\n  and slo:burnrate:rate1h{slo=\"\
          posting_availability\"} > 14.4\n  and slo:eligible_events:rate1h{slo=\"posting_availability\"\
          } * 3600 >= 20\n)"
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 2m
    annotations:
      summary: "posting_availability is burning its error budget at over 14.4x the sustainable rate across\
        \ both the 5m and 1h windows (multi-window multi-burn-rate alert, docs/plan/43 K7) \u2014 eligible-event\
        \ volume also cleared the 20/1h minimum gate, so this is not a low-traffic false positive."
      runbook: docs/runbooks/ledger-integrity-alert.md
    labels:
      severity: critical
      slo: posting_availability
      alert_type: slo_burn
