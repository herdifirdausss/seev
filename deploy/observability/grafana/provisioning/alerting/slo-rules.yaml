- orgId: 1
  name: operational_alerts
  folder: Seev
  interval: 1m
  rules:
  - uid: seev-op-ledger-verifier-discrepancy
    title: 'Ledger verifier: integrity discrepancy found'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: sum(increase(ledger_verification_discrepancies_total[15m]))
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 0m
    annotations:
      summary: The ledger verifier worker found at least one balance/entry integrity discrepancy in the
        last 15 minutes.
      runbook: docs/runbooks/ledger-integrity-alert.md
    labels:
      severity: critical
      component: ledger_verifier
      alert_type: operational
  - uid: seev-op-outbox-pending-backlog
    title: 'Ledger outbox: pending backlog'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: ledger_outbox_pending > 50
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 5m
    annotations:
      summary: "ledger_outbox_pending has stayed above 50 for 5 minutes \u2014 the outbox relay worker\
        \ is falling behind or stalled; downstream consumers (notifications, fraud velocity) are seeing\
        \ delayed events."
      runbook: docs/runbooks/ledger-integrity-alert.md
    labels:
      severity: warning
      component: ledger_outbox
      alert_type: operational
  - uid: seev-op-outbox-dead-events
    title: 'Ledger outbox: dead events present'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: ledger_outbox_dead_total > 0
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 0m
    annotations:
      summary: "At least one outbox event has exhausted its retry budget and moved to status=dead \u2014\
        \ requires manual replay via POST /admin/outbox/dead/{id}/replay."
      runbook: docs/runbooks/ledger-integrity-alert.md
    labels:
      severity: critical
      component: ledger_outbox
      alert_type: operational
  - uid: seev-op-notification-handler-slow
    title: 'Notification consumer: handler p95 latency high'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: histogram_quantile(0.95, sum(rate(rabbitmq_consume_handler_duration_seconds_bucket{queue="ledger.events.notifications"}[5m]))
          by (le)) > 2
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 5m
    annotations:
      summary: "Notification consumer handler p95 latency has exceeded 2s over the last 5 minutes \u2014\
        \ matches the webhook_latency SLO's own 2s threshold for consistency."
      runbook: docs/runbooks/reconciliation.md
    labels:
      severity: warning
      component: notify_consumer
      alert_type: operational
  - uid: seev-op-payout-stuck-backlog
    title: 'Payout: stuck request backlog'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: sum(payout_stuck_requests) > 5
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 5m
    annotations:
      summary: "More than 5 payout requests have stayed in created/held/submitted/vendor_pending past\
        \ the resume job's staleness threshold for 5 minutes \u2014 money is parked in the hold account\
        \ (not lost) but not progressing."
      runbook: docs/runbooks/reconciliation.md
    labels:
      severity: warning
      component: payout_resume
      alert_type: operational
  - uid: seev-op-breaker-open-extended
    title: 'Vendor circuit breaker: open for an extended period'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 21600
        to: 0
      datasourceUid: seev-prometheus
      model:
        editorMode: code
        expr: vendorgw_breaker_state == 2
        instant: true
        range: false
        refId: A
    - refId: C
      datasourceUid: __expr__
      model:
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
          operator:
            type: and
          query:
            params:
            - A
          reducer:
            type: last
        refId: C
    noDataState: OK
    execErrState: Alerting
    for: 5m
    annotations:
      summary: "A vendor's circuit breaker has stayed OPEN for 5 minutes straight \u2014 payin/payout\
        \ traffic to that vendor is being failed over or rejected; check vendor health."
      runbook: docs/runbooks/reconciliation.md
    labels:
      severity: warning
      component: vendor_breaker
      alert_type: operational
