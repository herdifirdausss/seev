# pgBackRest configuration for the seev cluster (docs/plan/50 K2-K4).
#
# The repository encryption passphrase is deliberately NOT in this file —
# it is supplied at invocation time via the PGBACKREST_REPO1_CIPHER_PASS
# environment variable, read from the `make backup-secret`-generated,
# mode-0600, gitignored secret file. A passphrase committed to a config
# file defeats the point of K3's "never stored with the backup" rule the
# moment this file is inspected by anyone with repo read access.
[global]
repo1-path=/backup-repo
repo1-retention-full=2
repo1-cipher-type=aes-256-cbc
process-max=2
start-fast=y
delta=y

# archive_timeout=60s (postgresql.conf, set via docker-compose.yml) plus
# this bounds how long WAL push/archive-related commands may run before
# pgBackRest gives up — keeps the five-minute RPO budget from K1 honest
# even under a stuck archive push.
archive-timeout=60

[seev]
pg1-path=/var/lib/postgresql/data
pg1-socket-path=/var/run/postgresql
# docs/plan/50 K5: pgBackRest defaults to connecting as whatever OS user
# invoked it (root, under `docker compose exec`) — there is no such
# Postgres role. Backup/status tooling must use the least-privilege
# seev_backup identity, never the schema owner, for routine operation.
pg1-user=seev_backup
